llm:
  api_base_url: "https://yunwu.ai/v1"   # OpenAI API compatible endpoint
  api_key: ""                            # Defaults to YUNWU_API_KEY env var
  model: "qwen3.5-397b-a17b"
  timeout: 120  # seconds

project:
  path: ""      # Optional project root; falls back to under_test/sample-java-project
  language: "java"  # Target language: java, cpp, …

pipeline:
  max_iterations: 5
  min_branch_coverage: 1.0  # 0.0–1.0; keep refining until this target is met

executor:
  keep_test: false
  jacoco_enabled: true
